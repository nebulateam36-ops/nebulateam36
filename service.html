<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nebula Team · Услуга</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&family=Orbitron:wght@500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <!-- ========== ХЕДЕР ========== -->
    <header>
        <div class="container header-inner">
            <div class="logo-container">
                <a href="index.html" style="text-decoration: none;">
                    <span class="logo-text">NEBULA</span>
                </a>
            </div>
            <nav>
                <button class="hamburger" id="hamburger" aria-label="Меню">
                    <i class="fas fa-bars"></i>
                </button>
                <ul id="nav-menu">
                    <li><a href="index.html#about">О нас</a></li>
                    <li><a href="index.html#services">Услуги</a></li>
                    <li><a href="index.html#contacts">Контакты</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <!-- ========== СТРАНИЦА УСЛУГИ ========== -->
    <section class="service-detail" style="padding: 60px 0; min-height: 70vh;">
        <div class="container">
            <a href="index.html#services" class="back-link" style="display: inline-block; margin-bottom: 30px; color: #00D4FF; font-weight: 500; text-decoration: none;">
                <i class="fas fa-arrow-left"></i> Назад к услугам
            </a>
            
            <div class="service-detail-card glass" style="padding: 50px; max-width: 900px; margin: 0 auto;" id="serviceContent">
                <!-- Контент загружается через JavaScript -->
                <div id="serviceLoader" style="text-align: center; padding: 40px;">
                    <i class="fas fa-spinner fa-spin" style="font-size: 3rem; color: #00D4FF;"></i>
                    <p style="margin-top: 20px; color: #b8ccff;">Загрузка информации...</p>
                </div>
            </div>
        </div>
    </section>

    <!-- ========== ФУТЕР ========== -->
    <footer style="padding: 30px 0; border-top: 1px solid rgba(42,92,255,0.15); text-align: center; color: #6a7fb5;">
        <div class="container">
            <p>© 2026 Nebula Team — создаём цифровые решения для вашего бизнеса</p>
        </div>
    </footer>

    <script src="service.js"></script>
    <script src="script.js"></script>
</body>
</html>
